<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ville — City & Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--gold:#d2af5a;--gold-light:#e2bf6a;--gold-dim:rgba(210,175,90,0.2);--bg:#080808;--bg2:#0b0b09;--text:#f0e8d8;--text2:#ede5d5;--muted:#8a8070;--muted2:#5a5040;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text2);}
a{text-decoration:none;color:inherit;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:8px 40px;background:rgba(8,8,8,0.97);border-bottom:0.5px solid var(--gold-dim);backdrop-filter:blur(10px);}
.nav-logo img{height:55px;width:auto;display:block;}
.nav-links{display:flex;gap:22px;}
.nav-links a{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#c8bca8;transition:color .3s;}
.nav-links a:hover{color:var(--gold);}
.nav-right{display:flex;gap:8px;align-items:center;}
.btn-ghost{font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;border:0.5px solid var(--gold-dim);color:var(--gold);background:transparent;cursor:pointer;font-family:'Montserrat',sans-serif;}
.btn-gold{font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;border:none;color:#000;background:var(--gold);cursor:pointer;font-family:'Montserrat',sans-serif;}
.lang-menu{position:relative;}
.lang-btn{font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:7px 12px;border:0.5px solid rgba(210,175,90,0.2);color:var(--gold);background:transparent;cursor:pointer;font-family:'Montserrat',sans-serif;}
.lang-drop{display:none;position:absolute;right:0;top:100%;background:#0f0f0d;border:0.5px solid rgba(210,175,90,0.2);min-width:150px;z-index:200;margin-top:4px;}
.lang-drop.open{display:flex;flex-direction:column;}
.lang-drop button{padding:9px 14px;font-size:11px;color:var(--text2);background:transparent;border:none;cursor:pointer;text-align:left;border-bottom:0.5px solid rgba(210,175,90,0.06);}
.lang-drop button:hover{background:rgba(210,175,90,0.06);color:var(--gold);}

/* HERO VILLE */
.v-hero{margin-top:74px;position:relative;height:480px;overflow:hidden;cursor:pointer;}
.v-hero-img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.v-hero:hover .v-hero-img{transform:scale(1.03);}
.v-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,8,.85) 0%,rgba(8,8,8,.2) 50%,transparent 100%);}
.v-hero-info{position:absolute;bottom:0;left:0;right:0;padding:32px 40px;}
.v-breadcrumb{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(210,175,90,.6);margin-bottom:8px;}
.v-breadcrumb a{color:rgba(210,175,90,.6);transition:color .2s;}
.v-breadcrumb a:hover{color:var(--gold);}
.v-city-name{font-family:'Playfair Display',serif;font-size:clamp(36px,6vw,72px);color:var(--text);line-height:1;margin-bottom:6px;}
.v-city-country{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:rgba(240,232,216,.7);margin-bottom:14px;}
.v-tags{display:flex;gap:8px;flex-wrap:wrap;}
.v-tag{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border:0.5px solid rgba(210,175,90,.3);color:rgba(210,175,90,.7);}

/* BANDEAU BOUTIQUES */
.v-boutiques-strip{background:#0a0a08;border-bottom:0.5px solid rgba(210,175,90,.1);padding:12px 0;overflow:hidden;}
.v-strip-inner{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:0 40px;scroll-behavior:smooth;}
.v-strip-inner::-webkit-scrollbar{display:none;}
.v-strip-card{flex-shrink:0;width:120px;cursor:pointer;border:1px solid transparent;transition:all .2s;}
.v-strip-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.v-strip-card img{width:120px;height:85px;object-fit:cover;display:block;}
.v-strip-name{font-size:8px;color:var(--muted);padding:5px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:#0d0d0b;}
.v-strip-cat{font-size:7px;color:var(--muted2);padding:0 4px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:#0d0d0b;}

/* INFOS VILLE */
.v-content{display:grid;grid-template-columns:1.6fr 1fr;}
.v-main{padding:36px 40px;}
.v-sec-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--text);margin-bottom:14px;}
.v-sec-title em{font-style:italic;color:var(--gold);}
.v-desc{font-size:11px;color:var(--muted);line-height:1.8;margin-bottom:24px;}
.v-quartiers{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.v-quartier{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;border:0.5px solid rgba(210,175,90,.2);color:var(--muted);}
.v-sidebar{padding:32px 28px;background:var(--bg2);border-left:0.5px solid rgba(210,175,90,.08);}
.v-info-ttl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.v-row{display:flex;gap:8px;padding:7px 0;border-bottom:0.5px solid rgba(255,255,255,.04);}
.v-key{color:var(--muted2);min-width:80px;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;padding-top:2px;flex-shrink:0;}
.v-val{color:#b8ac98;flex:1;font-size:10px;line-height:1.5;}
#v-map{width:100%;height:180px;margin-top:14px;border:0.5px solid rgba(210,175,90,.12);}
.v-btn-g{display:block;width:100%;padding:10px;background:var(--gold);border:none;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--bg);cursor:pointer;font-family:'Montserrat',sans-serif;text-align:center;text-decoration:none;transition:background .2s;margin-top:14px;}
.v-btn-g:hover{background:var(--gold-light);}
.v-btn-o{display:block;width:100%;padding:10px;background:transparent;border:0.5px solid rgba(210,175,90,.28);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);cursor:pointer;font-family:'Montserrat',sans-serif;text-align:center;margin-top:8px;}

/* LISTE BOUTIQUES */
.v-boutiques-section{padding:36px 40px;border-top:0.5px solid rgba(210,175,90,.08);}
.v-boutiques-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:20px;}
.v-bout-card{border:0.5px solid rgba(210,175,90,.1);cursor:pointer;transition:all .25s;}
.v-bout-card:hover{border-color:rgba(210,175,90,.4);transform:translateY(-2px);}
.v-bout-photo{width:100%;height:160px;object-fit:cover;display:block;}
.v-bout-info{padding:12px;background:#0d0d0b;}
.v-bout-cat{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.v-bout-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);font-style:italic;margin-bottom:3px;}
.v-bout-addr{font-size:9px;color:var(--muted2);}

/* VILLES SIMILAIRES */
.v-similar{padding:32px 40px;border-top:0.5px solid rgba(210,175,90,.08);}
.v-similar-grid{display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;margin-top:16px;}
.v-similar-grid::-webkit-scrollbar{display:none;}
.v-sim-card{flex-shrink:0;width:200px;cursor:pointer;border:0.5px solid rgba(210,175,90,.1);transition:all .25s;}
.v-sim-card:hover{border-color:rgba(210,175,90,.4);transform:translateY(-2px);}
.v-sim-photo{width:100%;height:130px;object-fit:cover;display:block;}
.v-sim-info{padding:10px;background:#0d0d0b;}
.v-sim-region{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}
.v-sim-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);font-style:italic;}

/* ERREUR / LOADING */
.v-loading,.v-error{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:14px;margin-top:74px;}
.v-loading p{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--muted);letter-spacing:2px;}

footer{border-top:0.5px solid rgba(210,175,90,.1);padding:18px 40px;display:flex;justify-content:space-between;align-items:center;}
.footer-brand{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;}
</style>
</head>

const VILLES_IDX = {};
VILLES.forEach(v => VILLES_IDX[v.id] = v);

function getId(){ return new URLSearchParams(window.location.search).get('id'); }

let lang = localStorage.getItem('cal_lang') || 'fr';
function setLang(l){ lang=l; localStorage.setItem('cal_lang',l); document.getElementById('currentLang').textContent=l.toUpperCase(); document.querySelectorAll('.lang-drop').forEach(d=>d.classList.remove('open')); }
document.addEventListener('DOMContentLoaded', () => { const el=document.getElementById('currentLang'); if(el) el.textContent=lang.toUpperCase(); });
document.addEventListener('click', e => { if(!e.target.closest('.lang-menu')) document.querySelectorAll('.lang-drop').forEach(d=>d.classList.remove('open')); });

function render(v){
  const bouts = BOUTIQUES.filter(b => b.city === v.name);
  
  const stripCards = bouts.map(b => {
    const photo = (b.photos||[])[0]||'';
    return '<a class="v-strip-card" href="boutique.html?id='+b.id+'"><img src="'+photo+'" loading="lazy" alt="'+b.name+'"><div class="v-strip-name">'+b.name+'</div><div class="v-strip-cat">'+b.category+'</div></a>';
  }).join('');

  const boutsCards = bouts.map(b => {
    const photo = (b.photos||[])[0]||'';
    return '<a class="v-bout-card" href="boutique.html?id='+b.id+'"><img class="v-bout-photo" src="'+photo+'" loading="lazy" alt="'+b.name+'"><div class="v-bout-info"><div class="v-bout-cat">'+b.category+'</div><div class="v-bout-name">'+b.name+'</div><div class="v-bout-addr">'+b.address+'</div></div></div>';
  }).join('');

  const quartiersHtml = (v.quartiers||[]).map(q => '<span class="v-quartier">'+q+'</span>').join('');

  const similarVilles = VILLES.filter(x => x.id !== v.id && x.region === v.region).slice(0,6);
  const simHtml = similarVilles.map(s => '<a class="v-sim-card" href="ville.html?id='+s.id+'"><img class="v-sim-photo" src="'+s.photo+'" loading="lazy" alt="'+s.name+'"><div class="v-sim-info"><div class="v-sim-region">'+s.country+'</div><div class="v-sim-name">'+s.name+'</div></div></a>').join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="v-hero" onclick="window.location.href='villes.html'">
      <img class="v-hero-img" src="${v.photo}" alt="${v.name}">
      <div class="v-hero-overlay"></div>
      <div class="v-hero-info">
        <div class="v-breadcrumb"><a href="villes.html">Villes</a> · ${v.country}</div>
        <div class="v-city-name">${v.name}</div>
        <div class="v-city-country">${v.country} — ${v.region.charAt(0).toUpperCase()+v.region.slice(1)}</div>
        <div class="v-tags">${(v.quartiers||[]).slice(0,3).map(q=>'<span class="v-tag">'+q+'</span>').join('')}</div>
      </div>
    </div>

    ${stripCards ? '<div class="v-boutiques-strip"><div class="v-strip-inner">'+stripCards+'</div></div>' : ''}

    <div class="v-content">
      <div class="v-main">
        <h2 class="v-sec-title">À propos de <em>${v.name}</em></h2>
        <p class="v-desc">${v.desc}</p>
        ${quartiersHtml ? '<div class="v-sec-title" style="font-size:14px;margin-bottom:10px;">Quartiers <em>incontournables</em></div><div class="v-quartiers">'+quartiersHtml+'</div>' : ''}
      </div>
      <div class="v-sidebar">
        <div class="v-info-ttl">Informations</div>
        <div class="v-row"><span class="v-key">Ville</span><span class="v-val">${v.name}</span></div>
        <div class="v-row"><span class="v-key">Pays</span><span class="v-val">${v.country}</span></div>
        <div class="v-row"><span class="v-key">Région</span><span class="v-val">${v.region.charAt(0).toUpperCase()+v.region.slice(1)}</span></div>
        <div class="v-row"><span class="v-key">Boutiques</span><span class="v-val" style="color:var(--gold)">${bouts.length} référencées</span></div>
        <div id="v-map"></div>
        <a href="https://maps.google.com?q=${encodeURIComponent(v.name)}" target="_blank" class="v-btn-g">Voir sur Google Maps</a>
        <button class="v-btn-o" onclick="location.href='villes.html'">← Toutes les villes</button>
      </div>
    </div>

    ${boutsCards ? '<div class="v-boutiques-section"><h2 class="v-sec-title">Boutiques à <em>'+v.name+'</em></h2><div class="v-boutiques-grid">'+boutsCards+'</div></div>' : ''}

    ${simHtml ? '<div class="v-similar"><h2 class="v-sec-title">Autres villes <em>'+v.region+'</em></h2><div class="v-similar-grid">'+simHtml+'</div></div>' : ''}
  `;

  if(v.lat && v.lon){
    setTimeout(() => {
      const map = L.map('v-map', {center:[v.lat,v.lon],zoom:13,zoomControl:true,scrollWheelZoom:false});

      bouts.forEach(b => {
        if(!b.lat||!b.lon) return;
        const icon = L.divIcon({className:'',html:'<div style="width:14px;height:14px;border-radius:50% 50% 50% 0;background:#d2af5a;transform:rotate(-45deg);box-shadow:0 2px 6px rgba(210,175,90,.5);"><div style="position:absolute;top:3px;left:3px;width:8px;height:8px;border-radius:50%;background:#080808;"></div></div>',iconSize:[14,14],iconAnchor:[7,14]});
        L.marker([b.lat,b.lon],{icon}).addTo(map).bindPopup(b.name);
      });
      map.invalidateSize();
    }, 300);
  }

  document.title = v.name + ' — City & Light';
}

document.addEventListener('DOMContentLoaded', () => {
  const id = getId();
  const v = id && VILLES_IDX[id];
  if(v) render(v);
  else document.getElementById('pageContent').innerHTML = '<div class="v-error"><p style="font-family:Playfair Display,serif;font-size:20px;color:var(--text)">Ville introuvable</p><a href="villes.html" style="margin-top:16px;padding:12px 24px;background:var(--gold);color:var(--bg);font-size:8px;letter-spacing:2px;text-transform:uppercase;font-family:Montserrat,sans-serif;">Voir toutes les villes</a></div>';
});
</script>
</body>
</html>
