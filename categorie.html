<!DOCTYPE html>
<html lang="fr" style="overflow-x:hidden;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catégorie — City & Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--gold:#d2af5a;--gold-light:#e2bf6a;--gold-dim:rgba(210,175,90,0.2);--bg:#080808;--bg2:#0b0b09;--text:#f0e8d8;--text2:#ede5d5;--muted:#8a8070;--muted2:#5a5040;}
html,body{max-width:100%;overflow-x:hidden;box-sizing:border-box;margin:0;padding:0;font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text2);}
a{text-decoration:none;color:inherit;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:8px 40px;background:rgba(8,8,8,0.97);border-bottom:0.5px solid var(--gold-dim);backdrop-filter:blur(10px);}
.nav-logo img{height:55px;width:auto;display:block;}
.nav-links{display:flex;gap:22px;}
.nav-links a{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#c8bca8;transition:color .3s;}
.nav-links a:hover{color:var(--gold);}
.nav-right{display:flex;gap:8px;align-items:center;}
.lang-menu{position:relative;}
.lang-btn{font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:7px 12px;border:0.5px solid rgba(210,175,90,0.2);color:var(--gold);background:transparent;cursor:pointer;font-family:'Montserrat',sans-serif;}
.lang-drop{display:none;position:absolute;right:0;top:100%;background:#0f0f0d;border:0.5px solid rgba(210,175,90,0.2);min-width:150px;z-index:200;}
.lang-drop.open{display:flex;flex-direction:column;}
.lang-drop button{padding:9px 14px;font-size:11px;color:var(--text2);background:transparent;border:none;cursor:pointer;text-align:left;}
.lang-drop button:hover{background:rgba(210,175,90,0.06);color:var(--gold);}
.page-header{margin-top:74px;padding:40px;border-bottom:0.5px solid rgba(210,175,90,0.1);}
.eyebrow{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,48px);color:var(--text);margin-bottom:6px;}
.page-title em{font-style:italic;color:var(--gold);}
.page-sub{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--muted);}
.filters-bar{padding:16px 40px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:0.5px solid rgba(210,175,90,0.08);background:var(--bg2);}
.filter-tag{font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border:0.5px solid rgba(210,175,90,0.2);color:var(--muted);background:transparent;cursor:pointer;transition:all .2s;}
.filter-tag.on{background:var(--gold);color:#080808;border-color:var(--gold);}
.boutiques-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:32px 40px;}
.b-card{border:0.5px solid rgba(210,175,90,0.1);cursor:pointer;transition:all .25s;}
.b-card:hover{border-color:rgba(210,175,90,0.4);transform:translateY(-2px);}
.b-card img{width:100%;height:180px;object-fit:cover;display:block;}
.b-card-info{padding:14px;background:#0d0d0b;}
.b-card-cat{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.b-card-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--text);font-style:italic;margin-bottom:3px;}
.b-card-city{font-size:9px;color:var(--muted2);}
.loading{padding:60px;text-align:center;font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--muted);}
.no-results{padding:60px;text-align:center;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:transparent;border:none;}
.hamburger span{display:block;width:22px;height:2px;background:var(--gold);transition:all .3s;}
.nav-mobile{display:none;position:fixed;top:71px;left:0;right:0;background:rgba(8,8,8,0.98);border-bottom:0.5px solid rgba(210,175,90,0.2);padding:16px 20px;flex-direction:column;gap:12px;z-index:99;}
.nav-mobile.open{display:flex;}
.nav-mobile a{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#c8bca8;padding:8px 0;border-bottom:0.5px solid rgba(210,175,90,0.08);}
footer{border-top:0.5px solid rgba(210,175,90,0.1);padding:18px 40px;display:flex;justify-content:space-between;align-items:center;}
.footer-brand{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;}
@media(max-width:768px){
  nav{padding:8px 16px;} .nav-links{display:none;} .hamburger{display:flex;}
  .page-header{padding:24px 16px;} .boutiques-grid{padding:16px;grid-template-columns:repeat(2,1fr);gap:8px;}
  .filters-bar{padding:12px 16px;}
}
@media(max-width:480px){
  .boutiques-grid{grid-template-columns:1fr;}
}
</style>

<script>
let lang = localStorage.getItem('cal_lang') || 'fr';
let allBoutiques = [];
let currentCat = '';

function setLang(l) { lang=l; localStorage.setItem('cal_lang',l); document.getElementById('currentLang').textContent=l.toUpperCase(); document.querySelectorAll('.lang-drop').forEach(d=>d.classList.remove('open')); }
document.addEventListener('click', e => { if(!e.target.closest('.lang-menu')) document.querySelectorAll('.lang-drop').forEach(d=>d.classList.remove('open')); });

// Hamburger
document.getElementById('hamburger-btn').addEventListener('click', () => {
  document.getElementById('nav-mobile').classList.toggle('open');
});

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  const title = document.getElementById('page-title');
  const sub = document.getElementById('page-sub');
  if(cat) {
    title.innerHTML = 'Boutiques <em>' + cat + '</em>';
    sub.textContent = allBoutiques.filter(b => b.category === cat).length + ' boutique(s) référencée(s)';
  } else {
    title.innerHTML = 'Toutes les <em>boutiques</em>';
    sub.textContent = allBoutiques.length + ' boutiques référencées';
  }
  renderBoutiques(cat ? allBoutiques.filter(b => b.category === cat) : allBoutiques);
}

function renderBoutiques(boutiques) {
  const grid = document.getElementById('boutiques-grid');
  if(!boutiques.length) {
    grid.innerHTML = '<div class="no-results"><p style="color:var(--muted);font-family:Cormorant Garamond,serif;font-size:18px;font-style:italic;">Aucune boutique dans cette catégorie</p></div>';
    return;
  }
  grid.innerHTML = boutiques.map(b => {
    const photo = (b.photos && b.photos[0]) || b.main_photo || '';
    return `<a class="b-card" href="boutique.html?id=${b.id}">
      ${photo ? `<img src="${photo}" alt="${b.name}" loading="lazy">` : '<div style="height:180px;background:#0d0d0b;"></div>'}
      <div class="b-card-info">
        <div class="b-card-cat">${b.category || ''}</div>
        <div class="b-card-name">${b.name}</div>
        <div class="b-card-city">${b.city}, ${b.country}</div>
      </div>
    </a>`;
  }).join('');
}

function buildFilters(boutiques) {
  const cats = [...new Set(boutiques.map(b => b.category).filter(Boolean))].sort();
  const bar = document.getElementById('filters-bar');
  bar.innerHTML = `<button class="filter-tag on" onclick="filterCat('', this)">Toutes (${boutiques.length})</button>` +
    cats.map(c => {
      const n = boutiques.filter(b => b.category === c).length;
      return `<button class="filter-tag" onclick="filterCat('${c}', this)">${c} (${n})</button>`;
    }).join('');
}

document.addEventListener('DOMContentLoaded', async () => {
  const el = document.getElementById('currentLang');
  if(el) el.textContent = lang.toUpperCase();
  
  const params = new URLSearchParams(window.location.search);
  const catParam = decodeURIComponent(params.get('cat') || '');
  
  // Essayer Supabase, sinon fallback JSON
  try {
    if(typeof loadBoutiques === 'function') {
      allBoutiques = await loadBoutiques();
    }
    if(!allBoutiques || allBoutiques.length === 0) throw new Error('Vide');
  } catch(e) {
    console.warn('Supabase indisponible — utilisation données locales');
    allBoutiques = BOUTIQUES_FALLBACK;
  }
  
  buildFilters(allBoutiques);
  
  if(catParam) {
    // Activer le filtre demandé
    const btns = document.querySelectorAll('.filter-tag');
    let found = false;
    btns.forEach(btn => {
      if(btn.textContent.startsWith(catParam)) {
        filterCat(catParam, btn);
        found = true;
      }
    });
    if(!found) {
      renderBoutiques(allBoutiques);
      document.getElementById('page-sub').textContent = allBoutiques.length + ' boutiques référencées';
    }
  } else {
    renderBoutiques(allBoutiques);
    document.getElementById('page-sub').textContent = allBoutiques.length + ' boutiques référencées';
  }
});
</script>
