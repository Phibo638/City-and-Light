<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche Boutique — City & Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--gold:#d2af5a;--gold-light:#e2bf6a;--gold-dim:rgba(210,175,90,0.2);--bg:#080808;--bg2:#0b0b09;--text:#f0e8d8;--text2:#ede5d5;--muted:#5a5040;--muted2:#3a3020;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text2);}
a{text-decoration:none;color:inherit;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 40px;background:rgba(8,8,8,0.97);border-bottom:0.5px solid var(--gold-dim);backdrop-filter:blur(10px);}
.nav-brand{display:flex;align-items:center;}
.nav-brand img{height:60px;width:auto;display:block;object-fit:contain;}
.nav-links{display:flex;gap:22px;}
.nav-links a{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#c8bca8;transition:color .3s;}
.nav-links a:hover{color:var(--gold);}
.nav-right{display:flex;gap:8px;align-items:center;}
.btn-back{font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;border:0.5px solid var(--gold-dim);color:var(--gold);background:transparent;cursor:pointer;font-family:'Montserrat',sans-serif;}
.btn-back:hover{background:rgba(210,175,90,0.08);}

/* LANG */
.lang-menu{position:relative;}
.lang-current{font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:7px 12px;border:0.5px solid rgba(210,175,90,0.2);color:var(--gold);background:transparent;cursor:pointer;font-family:'Montserrat',sans-serif;}
.lang-dropdown{display:none;position:absolute;right:0;top:100%;background:#0f0f0d;border:0.5px solid rgba(210,175,90,0.2);min-width:160px;z-index:200;margin-top:4px;}
.lang-dropdown.open{display:flex;flex-direction:column;}
.lang-dropdown button{padding:10px 16px;font-size:11px;color:var(--text2);background:transparent;border:none;cursor:pointer;text-align:left;font-family:'Montserrat',sans-serif;border-bottom:0.5px solid rgba(210,175,90,0.08);transition:background .2s;}
.lang-dropdown button:hover{background:rgba(210,175,90,0.06);color:var(--gold);}

/* HERO PHOTO */
.b-hero{margin-top:80px;position:relative;height:420px;overflow:hidden;}
.b-hero-main{width:100%;height:100%;object-fit:cover;display:block;}
.b-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,8,0.9) 0%,transparent 50%);}
.b-hero-info{position:absolute;bottom:0;left:0;right:0;padding:32px 40px;}
.b-badge{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:block;}
.b-name{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,52px);color:var(--text);margin-bottom:6px;}
.b-city{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--muted);}
.b-tags{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.b-tag{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border:0.5px solid rgba(210,175,90,0.3);color:#8a7a60;}

/* GALERIE */
.b-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px;padding:4px 0;}
.b-gallery-thumb{height:140px;object-fit:cover;cursor:pointer;transition:opacity .3s;display:block;width:100%;}
.b-gallery-thumb:hover{opacity:.85;}

/* CONTENU */
.b-content{display:grid;grid-template-columns:1.5fr 1fr;gap:0;}
.b-main{padding:36px 40px;}
.b-section-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:16px;}
.b-section-title em{font-style:italic;color:var(--gold);}
.b-desc{font-size:11px;color:#8a8070;line-height:1.8;margin-bottom:24px;}
.b-sidebar{padding:36px 28px;background:var(--bg2);border-left:0.5px solid rgba(210,175,90,0.1);}
.b-info-block{margin-bottom:24px;}
.b-info-title{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.b-row{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,0.04);}
.b-key{color:var(--muted2);min-width:80px;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;padding-top:2px;}
.b-val{color:#b8ac98;flex:1;font-size:10px;}
.b-val a{color:var(--gold);}
.b-btns{display:flex;flex-direction:column;gap:8px;margin-top:20px;}
.b-btn-g{padding:12px;background:var(--gold);border:none;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--bg);cursor:pointer;font-family:'Montserrat',sans-serif;text-align:center;transition:background .2s;}
.b-btn-g:hover{background:var(--gold-light);}
.b-btn-o{padding:12px;background:transparent;border:0.5px solid rgba(210,175,90,0.3);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);cursor:pointer;font-family:'Montserrat',sans-serif;text-align:center;}
.b-btn-o:hover{background:rgba(210,175,90,0.06);}

/* MINI CARTE */
#b-map{width:100%;height:200px;margin-top:16px;border:0.5px solid rgba(210,175,90,0.15);}

/* BOUTIQUES SIMILAIRES */
.similar-section{padding:36px 40px;border-top:0.5px solid rgba(210,175,90,0.1);}
.similar-grid{display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;margin-top:16px;}
.similar-grid::-webkit-scrollbar{display:none;}
.similar-card{flex-shrink:0;width:180px;border:0.5px solid rgba(210,175,90,0.1);cursor:pointer;transition:border-color .3s,transform .2s;}
.similar-card:hover{border-color:rgba(210,175,90,0.4);transform:translateY(-2px);}
.similar-photo{width:100%;height:120px;object-fit:cover;display:block;}
.similar-info{padding:8px 10px;background:#0d0d0b;}
.similar-cat{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
.similar-name{font-family:'Playfair Display',serif;font-size:12px;color:var(--text);font-style:italic;}
.similar-city{font-size:8px;color:var(--muted);}

/* ERREUR */
.b-error{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.b-error-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--text);}
.b-error-sub{font-size:10px;color:var(--muted);letter-spacing:2px;}

/* FOOTER */
footer{border-top:0.5px solid rgba(210,175,90,0.1);padding:20px 40px;display:flex;justify-content:space-between;align-items:center;}
.footer-brand{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;}

/* LOADING */
.b-loading{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.b-loading-text{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--muted);letter-spacing:2px;}
</style>
</head>

// Créer un index par id
const BOUTIQUES_INDEX = {};
BOUTIQUES.forEach(b => { BOUTIQUES_INDEX[b.id] = b; });

// ── RÉCUPÉRER L'ID DANS L'URL ──
function getBoutiqueId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

// ── RETOUR ──
function goBack() {
  const b = BOUTIQUES_INDEX[getBoutiqueId()];
  if (b && b.back) window.location.href = b.back;
  else window.location.href = 'villes.html';
}

// ── LANGUE ──
let currentLang = localStorage.getItem('cal_lang') || 'fr';
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('cal_lang', lang);
  document.getElementById('currentLang').textContent = lang.toUpperCase();
  document.querySelectorAll('.lang-dropdown').forEach(d => d.classList.remove('open'));
}
document.addEventListener('DOMContentLoaded', () => {
  if(document.getElementById('currentLang'))
    document.getElementById('currentLang').textContent = currentLang.toUpperCase();
});
document.addEventListener('click', e => {
  if (!e.target.closest('.lang-menu'))
    document.querySelectorAll('.lang-dropdown').forEach(d => d.classList.remove('open'));
});

// ── RENDU DE LA FICHE ──
function renderBoutique(b) {
  const photos = b.photos || [];
  const p1 = photos[0] || '';
  const galleryHtml = photos.slice(1).map(p =>
    `<img class="b-gallery-thumb" src="${p}" alt="${b.name}" loading="lazy">`
  ).join('');

  const tagsHtml = (b.tags || []).map(t => `<span class="b-tag">${t}</span>`).join('');

  const similarBoutiques = BOUTIQUES
    .filter(x => x.id !== b.id && (x.city === b.city || x.category === b.category))
    .slice(0, 6);

  const similarHtml = similarBoutiques.map(s => `
    <div class="similar-card" onclick="window.location.href='boutique.html?id=${s.id}'">
      <img class="similar-photo" src="${s.photos[0] || ''}" alt="${s.name}" loading="lazy">
      <div class="similar-info">
        <div class="similar-cat">${s.category}</div>
        <div class="similar-name">${s.name}</div>
        <div class="similar-city">${s.city}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('pageContent').innerHTML = `
    <!-- HERO -->
    <div class="b-hero">
      <img class="b-hero-main" src="${p1}" alt="${b.name}">
      <div class="b-hero-overlay"></div>
      <div class="b-hero-info">
        <span class="b-badge">✦ ${b.badge}</span>
        <div class="b-name">${b.name}</div>
        <div class="b-city">${b.city}, ${b.country}</div>
        <div class="b-tags">${tagsHtml}</div>
      </div>
    </div>

    <!-- GALERIE -->
    ${galleryHtml ? `<div class="b-gallery">${galleryHtml}</div>` : ''}

    <!-- CONTENU + SIDEBAR -->
    <div class="b-content">
      <div class="b-main">
        <h2 class="b-section-title">À propos de <em>${b.name}</em></h2>
        <p class="b-desc">${b.desc}</p>
      </div>
      <div class="b-sidebar">
        <div class="b-info-block">
          <div class="b-info-title">Informations</div>
          ${b.address ? `<div class="b-row"><span class="b-key">Adresse</span><span class="b-val">${b.address}</span></div>` : ''}
          ${b.hours ? `<div class="b-row"><span class="b-key">Horaires</span><span class="b-val">${b.hours}</span></div>` : ''}
          ${b.phone ? `<div class="b-row"><span class="b-key">Téléphone</span><span class="b-val">${b.phone}</span></div>` : ''}
          ${b.website ? `<div class="b-row"><span class="b-key">Site web</span><span class="b-val"><a href="${b.website}" target="_blank">${b.website.replace('https://www.','').replace('https://','').split('/')[0]} →</a></span></div>` : ''}
          <div class="b-row"><span class="b-key">Catégorie</span><span class="b-val">${b.category}</span></div>
        </div>
        <div class="b-btns">
          ${b.address ? `<a href="https://maps.google.com?q=${encodeURIComponent(b.name + ' ' + b.address)}" target="_blank" class="b-btn-g">Itinéraire Google Maps</a>` : ''}
          ${b.website ? `<a href="${b.website}" target="_blank" class="b-btn-o">Visiter le site web</a>` : ''}
          <button class="b-btn-o" onclick="goBack()">← Retour à la liste</button>
        </div>
        <div id="b-map"></div>
      </div>
    </div>

    <!-- BOUTIQUES SIMILAIRES -->
    ${similarHtml ? `
    <div class="similar-section">
      <h2 class="b-section-title">Vous aimerez aussi <em>ces boutiques</em></h2>
      <div class="similar-grid">${similarHtml}</div>
    </div>` : ''}
  `;

  // Initialiser la mini carte
  if (b.lat && b.lon) {
    setTimeout(() => {
      const map = L.map('b-map', {
        center: [b.lat, b.lon],
        zoom: 15,
        zoomControl: true,
        scrollWheelZoom: false
      });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);
      const icon = L.divIcon({
        className: '',
        html: '<div style="width:20px;height:20px;border-radius:50% 50% 50% 0;background:linear-gradient(135deg,#e2bf6a,#b8952e);transform:rotate(-45deg);box-shadow:0 2px 10px rgba(210,175,90,0.5);border:1px solid rgba(255,255,255,0.1);"><div style="position:absolute;top:5px;left:5px;width:10px;height:10px;border-radius:50%;background:#080808;"></div></div>',
        iconSize: [20, 20],
        iconAnchor: [10, 20],
      });
      L.marker([b.lat, b.lon], {icon}).addTo(map).bindPopup(b.name).openPopup();
      map.invalidateSize();
    }, 300);
  }

  // Mettre à jour le titre de la page
  document.title = b.name + ' — City & Light';
}

// ── AFFICHER L'ERREUR ──
function renderError(id) {
  document.getElementById('pageContent').innerHTML = `
    <div class="b-error">
      <div class="b-error-title">Boutique introuvable</div>
      <div class="b-error-sub">L'identifiant "${id || ''}" ne correspond à aucune boutique</div>
      <a href="villes.html" style="margin-top:16px;padding:12px 24px;background:#d2af5a;color:#080808;font-size:8px;letter-spacing:2px;text-transform:uppercase;font-family:Montserrat,sans-serif;">Voir toutes les boutiques</a>
    </div>
  `;
}

// ── INITIALISATION ──
document.addEventListener('DOMContentLoaded', () => {
  const id = getBoutiqueId();
  if (id && BOUTIQUES_INDEX[id]) {
    renderBoutique(BOUTIQUES_INDEX[id]);
  } else {
    renderError(id);
  }
});
</script>
</body>
</html>
